name: Deploy Lambda

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap -tags lambda.norpc main.go
          zip issuer-lambda.zip bootstrap

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::043189681060:role/ZeroVerifyGitHubActionsLambdaDeployment
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 cp issuer-lambda.zip s3://zeroverify-deployment-artifacts/lambda/issuer-lambda.zip

      - name: Update Lambda Function
        run: |
          aws lambda update-function-code \
            --function-name zeroverify-issuer \
            --s3-bucket zeroverify-deployment-artifacts \
            --s3-key lambda/issuer-lambda.zip
